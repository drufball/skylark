name: architecture review (PR)

# Agentic, advisory architecture review of a PR. NOT a gate: an agent reads the
# diff (and the whole ship around it), then leaves a survey and inline comments.
# The PR author — human or agent — decides what to act on.
#
# It runs ONE automatic pass per PR — on open / ready-for-review, skipping
# drafts — and never on subsequent pushes, so it can't spiral. To ask for
# another pass deliberately, comment `@architecture-review` on the PR.
#
# The review itself is the `architecture-review` skill
# (.claude/skills/architecture-review/SKILL.md) — the same brief is reused by
# the weekly whole-ship review and by anyone running it locally.

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write # OIDC: lets the action mint its GitHub App token (Anthropic auth is the OAuth token in with:)

concurrency:
  group:
    architecture-review-${{ github.event.pull_request.number ||
    github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # The single automatic pass (non-draft PRs only), or an explicit re-run
    # requested by an `@architecture-review` comment on the PR.
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft ==
      false) || (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@architecture-review'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the review can diff against main

      - name: Check out the PR's head
        run: gh pr checkout "$PR"

      - name: Architecture review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus
            --max-turns 40
            --allowedTools Bash,Read,Grep,Glob
          prompt: |
            One-time, advisory architecture review of this PR (#$PR in
            ${{ github.repository }}). Not a gate; do not edit code; one pass.

            Run `/architecture-review`. The diff is
            `git diff --merge-base origin/main`.

            Leave feedback with the `gh` CLI (head commit: `git rev-parse HEAD`):

            1. ONE top-level comment, starting with the literal marker
               `<!-- architecture-review -->` and ending with: "Advisory only —
               not a merge gate. Comment `@architecture-review` to run this
               again."
               `gh pr comment "$PR" --body-file <file>`
            2. For findings on lines this PR changed, an inline comment at that
               file:line — up to 8, highest value first. Findings on unchanged
               lines or spanning the codebase go in the top-level comment only
               (GitHub rejects inline comments outside the diff).
               `gh api repos/${{ github.repository }}/pulls/$PR/comments
                -f body=... -f commit_id=<sha> -f path=<file> -F line=<n>
                -f side=RIGHT`
