name: mutation review

# Agentic, advisory mutation-testing review of a PR's test quality. NOT a gate:
# the agent runs mutation testing on the diff, triages the surviving mutants,
# and leaves comments. The PR author decides what to act on.
#
# One automatic pass per PR (open / ready-for-review, skipping drafts).
# Comment `@mutation-review` to request a fresh review.
#
# Runs via `tessl launch skill --cloud` — the entire job (npm install, mutation
# testing, triage, commenting) happens in a Tessl cloud sandbox.

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group:
    mutation-review-${{ github.event.pull_request.number ||
    github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && !github.event.pull_request.draft)
      || (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@mutation-review') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'ADMIN'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PR: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_IS_CROSS_REPOSITORY:
            ${{ github.event.pull_request.head.repo.full_name !=
            github.repository }}
          COMMENT_PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_NUMBER="$COMMENT_PR_NUMBER"
            PR_JSON=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json isCrossRepository)
            IS_CROSS_REPOSITORY=$(jq -r .isCrossRepository <<< "$PR_JSON")
          else
            PR_NUMBER="$EVENT_PR_NUMBER"
            IS_CROSS_REPOSITORY="$EVENT_IS_CROSS_REPOSITORY"
          fi
          echo "pr-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is-cross-repository=$IS_CROSS_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Reject cross-repository PRs
        if: steps.pr.outputs.is-cross-repository == 'true'
        run: |
          echo "Refusing to run privileged mutation review on a cross-repository PR." >&2
          exit 1

      - name: Setup Tessl
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Install Tessl dependencies
        run: tessl install

      - name: Write cloud env file
        run: |
          cat > .env.cloud <<EOF
          GH_TOKEN=${{ github.token }}
          PR=${{ steps.pr.outputs.pr-number }}
          REPO=${{ github.repository }}
          EOF

      - name: Launch mutation review in cloud
        # The skill lives in this repo's plugin, not the workspace registry, so
        # reference it as a local path — a bare name 404s in the cloud launcher.
        # No --workspace flag: it defaults to the linked project's workspace,
        # which is correct here. KNOWN BLOCKER (2026-07-02): under API-key auth
        # (TESSL_TOKEN) the server's POST /experimental/launch-runs rejects
        # every variant (no flag / name / ID) with "404 Workspace not found",
        # even though the key is scoped to this workspace and the env-file
        # upload to the same workspace succeeds. User-auth launches work. Needs
        # a Tessl backend fix; the workflow stays manually disabled until then.
        run: |
          tessl launch skill file:./plugins/skylark-builder/skills/mutation-review \
            --cloud \
            --repo ${{ github.repository }} \
            --agent tessl-agent \
            --env-file .env.cloud
