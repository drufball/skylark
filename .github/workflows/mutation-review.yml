name: mutation review

# Agentic, advisory mutation-testing review of a PR's test quality. NOT a gate:
# the agent runs mutation testing on the diff, triages the surviving mutants,
# and leaves comments. The PR author decides what to act on.
#
# One automatic pass per PR (open / ready-for-review, skipping drafts).
# Comment `@mutation-review` to request a fresh review.
#
# Runs via `tessl launch skill --cloud` — the entire job (npm install, mutation
# testing, triage, commenting) happens in a Tessl cloud sandbox.

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group:
    mutation-review-${{ github.event.pull_request.number ||
    github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && !github.event.pull_request.draft)
      || (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@mutation-review'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PR: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - name: Setup Tessl
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Launch mutation review in cloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tessl launch skill mutation-review \
            --cloud \
            --repo ${{ github.repository }} \
            --agent tessl-agent \
            --instructions "PR=${{ env.PR }} REPO=${{ github.repository }}"
