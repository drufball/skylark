name: change review

# Agentic, advisory PR change review via claude-code-action. NOT a gate: an
# agent reads the diff (and the ship around it), then leaves one survey
# comment plus inline comments on changed lines. The PR author — human or
# agent — decides what to act on.
#
# One automatic pass per PR — on open / reopen / ready-for-review, skipping
# drafts — and never on subsequent pushes, so it can't spiral. To ask for
# another pass deliberately, comment `@change-review` on the PR.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write # OIDC: lets the action mint its GitHub App token

concurrency:
  group:
    change-review-${{ github.event.pull_request.number ||
    github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # The single automatic pass (non-draft PRs only), or an explicit re-run
    # requested by a `@change-review` comment on the PR.
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft ==
      false) || (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@change-review'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the review can diff against main

      - name: Check out the PR's head
        run: gh pr checkout "$PR"

      - name: Change review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus
            --max-turns 50
            --allowedTools Bash,Read,Grep,Glob
          prompt: |
            One-time, advisory change review of PR #$PR in
            ${{ github.repository }}. Not a gate; do not edit code; one pass.

            The diff is `git diff --merge-base origin/main`. Read the
            surrounding code, not just the diff. Review through five lenses:

            1. **Legibility** — could a cold reader understand each name,
               type, return shape, and abstraction from what's in front of
               them? Flag problems whose fix is renaming, restructuring,
               narrowing types, inlining, or extracting — not adding comments.
            2. **Test risk** — changed behaviour without meaningful tests, bug
               fixes without a regression test, async/error/edge branches left
               uncovered, brittle tests asserting implementation trivia.
            3. **Contract boundaries** — API schemas, CLI flags, event
               payloads, DB migrations, job contracts: could this change break
               an existing consumer?
            4. **Security** — auth/authz, untrusted input, injection, secrets,
               sensitive logging, file/network access, dependency changes.
            5. **Local precedent** — does new code reimplement an existing
               helper, component, schema, route shape, or convention? Check a
               few plausible precedent files, not the whole repo.

            Report only high-confidence, file-anchored findings. No nitpicks,
            no style opinions Prettier/ESLint already own.

            Leave feedback with the `gh` CLI (head commit: `git rev-parse HEAD`):

            1. ONE top-level comment, starting with the literal marker
               `<!-- change-review -->` and ending with: "Advisory only — not
               a merge gate. Comment `@change-review` to run this again."
               `gh pr comment "$PR" --body-file <file>`
            2. For findings on lines this PR changed, an inline comment at
               that file:line — up to 8, highest value first. Findings on
               unchanged lines or spanning the codebase go in the top-level
               comment only (GitHub rejects inline comments outside the diff).
               `gh api repos/${{ github.repository }}/pulls/$PR/comments
                -f body=... -f commit_id=<sha> -f path=<file> -F line=<n>
                -f side=RIGHT`
