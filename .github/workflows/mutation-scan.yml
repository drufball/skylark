name: mutation scan

# Weekly full-project mutation sweep. Unlike the per-PR review, this one acts:
# an agent strengthens the tests around the most valuable surviving mutants and
# opens a PR with the fixes. That PR then flows through the normal mutation
# review like any other.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: mutation-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: ./scripts/setup

      - name: Full mutation sweep
        run: npm run mutate
        continue-on-error: true

      - name: Archive the report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation
          if-no-files-found: ignore

      - name: Strengthen tests and open a PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model opus
            --max-turns 60
            --allowedTools Bash,Read,Grep,Glob,Edit,Write
          prompt: |
            A full-project mutation sweep just ran. The Stryker JSON report is at
            `reports/mutation/mutation.json`. Your job is to raise the project's
            test quality by closing the most valuable gaps it found, then open a
            pull request with your work.

            1. Read the report. Find mutants with status "Survived" and
               "NoCoverage". Discard equivalent/cosmetic ones. Rank the rest by
               how real the risk is — a surviving mutant in core logic that could
               ship a silent bug beats a trivial one.

            2. For the top handful (aim for the highest-value gaps, not volume),
               strengthen the EXISTING tests or add new ones so those mutants
               would be killed. Follow this repo's testing conventions
               (see CLAUDE.md and src/zine.md): Vitest, red-green TDD, service
               logic tested against in-memory PGlite. Add tests only — do not
               change source behaviour to make a mutant equivalent.

            3. Verify with `npm run check` (format, lint, typecheck, test). It
               must pass before you open the PR.

            4. Create a branch `mutation-scan/<ISO date>` (get the date from
               `date +%F`), commit the test changes with a clear message, push,
               and open a PR with `gh pr create`. The PR body should: summarise
               the gaps you closed (file:line + what each test now pins down),
               note the mutation score before, and state that it was generated by
               the weekly mutation scan. Title it "Mutation scan: strengthen
               tests (<date>)".

            If there were no worthwhile survivors, do not open a PR — just stop.
            Make one pass. Keep the change focused on tests.
