name: format, lint, knip, typecheck, test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # Same bootstrap the whole crew uses — local, worktrees, Claude sessions, CI.
      - run: ./scripts/setup
      # format:check + lint + knip + typecheck + test. Tests run on in-memory
      # PGlite, so CI needs no Postgres.
      - run: npm run check

  # Two coverage gates sharing one test run: a global threshold (vitest.config.ts)
  # and, on PRs, diff coverage of the changed lines vs main (scripts/coverage-diff).
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # diff-cover compares this branch against origin/main — needs full history.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # Provides uvx so scripts/coverage-diff can run diff-cover — nothing to install.
      - uses: astral-sh/setup-uv@v8.2.0
      - run: ./scripts/setup
      # Global gate: fails if overall coverage drops below the threshold.
      - name: Global coverage gate
        run: npm run coverage
      # Diff gate: fails if too few of the lines you changed are tested.
      # PR-only — there is no diff to measure on a push to main.
      - name: Diff coverage gate (changed lines vs main)
        if: github.event_name == 'pull_request'
        run: npm run coverage:diff

  # Smoke: boot the REAL server (fake agent runtime, dedicated skylark_smoke
  # db) and drive the critical paths with Playwright. Catches what verify +
  # coverage structurally can't — routes, serverFn doors, actor resolution,
  # the SSE stream — i.e. "the app actually starts". Motivating incident:
  # PR #92 merged fully green while GET / threw in the browser (#u4ct).
  smoke:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skylark
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skylark" --health-interval 5s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: ./scripts/setup
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # global-setup creates/migrates/seeds skylark_smoke on the service db;
      # the app boots with SKYLARK_FAKE_RUNTIME=1 so no model is ever called.
      - run: npm run smoke
