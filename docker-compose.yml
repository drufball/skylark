# Local Postgres + the LLM gateway for the ship.
#
# Tests do NOT need these — they run on in-memory PGlite and never call a
# model. This is only for running the live app.
#
#   npm run db:up        # start Postgres (detached)
#   npm run gateway:up   # start the LiteLLM gateway (detached)
#   docker compose down  # stop everything (pg data persists in ./.pgdata)
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skylark
    ports:
      - '5432:5432'
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d skylark']
      interval: 5s
      timeout: 5s
      retries: 5

  # The LLM gateway (LiteLLM proxy). The app speaks OpenAI-compatible HTTP to
  # this one endpoint. Models and provider keys are managed in the gateway's
  # admin UI (http://localhost:4000/ui — log in as `admin` with the master
  # key) and stored encrypted in the gateway's own database; nothing
  # provider-specific lives in .env or litellm.config.yaml.
  litellm:
    image: ghcr.io/berriai/litellm-database:main-stable
    restart: unless-stopped
    command: ['--config', '/app/config.yaml']
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Where UI-added models and their encrypted provider keys live: a
      # separate `litellm` database in the ship's Postgres, created by
      # scripts/gateway-up before this container boots.
      DATABASE_URL: postgres://postgres:postgres@db:5432/litellm
      # The key the gateway requires on every request; the app sends the same
      # value automatically (see gatewayApiKey), and `admin` + this key logs
      # into the UI. scripts/configure-env generates a real secret into .env;
      # the fallback only suits a localhost-only gateway on a dev clone.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm}
      # Encrypts provider keys at rest in the database. Never rotate it once
      # keys are stored — they'd become undecryptable and need re-adding in
      # the UI.
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-litellm}
    ports:
      # Localhost only: the default master key is a public constant, and the
      # gateway relays to paid provider APIs — never expose it to the LAN by
      # default. Exposing it deliberately means binding wider AND setting a
      # real LITELLM_MASTER_KEY.
      - '127.0.0.1:4000:4000'
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    extra_hosts:
      # Lets a model_list entry reach an OpenAI-compatible server on the host
      # (bring-your-own local model) via host.docker.internal, on Linux too.
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request;
          urllib.request.urlopen('http://localhost:4000/health/liveliness')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
