# The ship's LLM gateway (LiteLLM proxy). Every model call the app makes goes
# through this proxy — the app only ever speaks OpenAI-compatible HTTP to
# http://localhost:4000/v1 and names a model. Which provider actually serves
# a name (and with which key) is decided in the gateway's admin UI at
# http://localhost:4000/ui — log in as `admin` with the LITELLM_MASTER_KEY
# from .env, add a model, pick the provider, paste the key. Entries live
# encrypted in the gateway's own `litellm` database, so no provider keys in
# .env, nothing to edit here, and swapping providers never touches app code.
#
# A fresh ship needs a model named `claude-sonnet-5` (the app's default) — or
# SKYLARK_DEFAULT_MODEL in .env set to whatever name you do add. Local
# servers on the host (Ollama, llama.cpp, LM Studio, …) work from the UI too:
# add an OpenAI-compatible model with api_base
# http://host.docker.internal:<port>/v1.
#
# Brought up by `npm run gateway:up` (hoist/serve do this). This file only
# carries gateway-wide settings. Docs: https://docs.litellm.ai

general_settings:
  # Persist UI-added models (and their encrypted keys) to the database and
  # load them on boot — the whole point; see the header.
  store_model_in_db: true

litellm_settings:
  # Don't forward provider-specific params the target may reject.
  drop_params: true
